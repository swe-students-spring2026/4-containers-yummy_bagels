{% extends "base.html" %}
{% block content %}
  {% if error %}
    <p>{{ error }}</p>
  {% endif %}

  <form method="post">
    <input name="email" type="email" placeholder="Email Address" required />
    <input name="password" type="password" placeholder="Password" required />

    <button>Sign In</button>
    <a href="{{ url_for('signup') }}">Create Account</a>
  </form>
{% endblock %}
