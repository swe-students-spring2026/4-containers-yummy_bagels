name: Machine learning client - tests

on:
  pull_request:
    branches: [main, feature/ci-workflow]
  push:
    branches: [main, feature/ci-workflow]

jobs:
  test-ml-client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: machine-learning-client

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f dockerfile -t ml-client:ci .

      - name: Run tests in container
        run: |
          docker run --rm \
            -e MONGO_URI=mongodb://127.0.0.1:27017 \
            -e MONGO_DBNAME=test_db \
            ml-client:ci sh -c "pip install --no-cache-dir pytest && pytest -v"
