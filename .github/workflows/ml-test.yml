name: Machine learning client - tests

on:
  pull_request:
    branches: [main, feature/ci-workflow]
  push:
    branches: [main, feature/ci-workflow]

jobs:
  test-ml-client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: machine-learning-client

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: |
          which python
          python --version

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Make Pipfile match matrix Python
        run: |
          sed -i 's/^python_version = .*/python_version = "${{ matrix.python-version }}"/' Pipfile
          cat Pipfile

      - name: Remove old lockfile
        run: rm -f Pipfile.lock

      - name: Install dependencies
        run: python -m pipenv --python "$(which python)" install --dev

      - name: Build package
        run: python -m pipenv run python -m build

      - name: Run tests
        run: python -m pipenv run pytest
